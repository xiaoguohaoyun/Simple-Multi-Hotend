#####################################################################
#                            热床配置                                # 
#####################################################################

[heater_bed]
heater_pin: PB0              # 热床接口
sensor_type: Generic 3950    # 热床传感器类型
sensor_pin:  PC5             # 热床传感器接口
max_power: 1.0               # 热床功率
min_temp: -273                  # 最小温度（注意：测量温度超过设定值会触发紧急停止）
max_temp: 100                # 最大温度（注意：测量温度超过设定值会触发紧急停止）
# 热床温度PID校准命令：  "PID_CALIBRATE HEATER=heater_bed TARGET=100"
#control: pid                # PID热床温度自动校准项（pid校准完成后，会被注释）
#pid_kp: 58.437              # PID热床温度自动校准项（pid校准完成后，会被注释）
#pid_ki: 2.347               # PID热床温度自动校准项（pid校准完成后，会被注释）
#pid_kd: 363.769             # PID热床温度自动校准项（pid校准完成后，会被注释）

#####################################################################
#                            风扇配置                                # 
#####################################################################
[fan]                        # 模型冷却风扇
pin: expander:PC8            # 信号接口
kick_start_time: 0.5         # 启动时间（勿动）
off_below: 0.10              # 勿动
#--------------------------------------------------------------------
[heater_fan hotend_fan]    
pin: expander:PC9            # 信号接口
max_power: 1.0               # 最大转速
kick_start_time: 0.5         # 启动时间(勿动)
heater: extruder,extruder1,extruder2,extruder3             # 关联的设备:挤出机
heater_temp: 50              # 挤出机达到多少度启动风扇
fan_speed: 1.0               # 风扇转速
#--------------------------------------------------------------------
[heater_fan dock_fan]    
pin: PA0                     # 信号接口
max_power: 1.0               # 最大转速
kick_start_time: 0.5         # 启动时间(勿动)
heater: extruder,extruder1,extruder2,extruder3              # 关联的设备:挤出机
heater_temp: 50              # 挤出机达到多少度启动风扇
fan_speed: 1.0               # 风扇转速
#--------------------------------------------------------------------

[temperature_fan Fly-C8p_Fan] 
pin: PC6                    
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.1

sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

# --- 温控策略 ---
control: watermark            # 开关模式，到了温度就转，低于就停
target_temp: 45.0             # 45度开始转
max_delta: 2.0                # 温度回落2度后停止

#####################################################################
#                           调平传感器                               #
#####################################################################
[probe]
pin: ^PA4
x_offset: 2.88                  # X轴-传感器相对喷嘴偏移量
y_offset: 11.63                 # Y轴-传感器相对喷嘴偏移量
#z_offset: 5.07              # Z轴-传感器相对喷嘴偏移量
#PROBE_CALIBRATE （探针校准）
speed: 10                     # 调平速度
samples: 3                   # 采样次数
samples_result: median       # 取值方式（默认median-中位数）
sample_retract_dist: 3.0     # 调平回缩距离
lift_speed:8                # 离开速度
samples_tolerance: 0.005     # 采样公差（注意过小的值可能造成采样次数增加）
samples_tolerance_retries: 6 # 超公差重试次数

#####################################################################
#                               归位                                #
#####################################################################
[homing_override]
axes: z
set_position_z: 0                 
gcode:
    G91
    G1 Z10 F600   
    G90 

    # 检查 X 是否回零，如果没有则回零
    {% if "x" not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}
    
    # 检查 Y 是否回零，如果没有则回零
    {% if "y" not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}

    UNTOOL  # 执行你的卸载工具宏

    # 移动到热床中间进行 Z 回零（请根据你的床尺寸调整 X150 Y150）
    G0 X{ printer.toolhead.axis_maximum.x/2 } Y{ printer.toolhead.axis_maximum.y/2 } F6000

    # 正式执行 Z 回零
    G28 Z

    # 归位后稍微抬升一点
    G1 Z20 F600

#####################################################################
#   3Z调平 
#####################################################################
[z_tilt]
# z_positions: 丝杠的物理坐标（旋转中心点）
# 想象一下如果喷嘴能移到丝杠的正上方，那个点的 XY 坐标是多少。
# 注意：这些点通常在打印区域之外。
z_positions:
    -15, -5           # 丝杠 1 (stepper_z) 的物理位置
    117.5, 255        # 丝杠 2 (stepper_z1) 的物理位置
    250, 10           # 丝杠 3 (stepper_z2) 的物理位置

# points: 探头去测量的坐标点（探头接触床的点）
points:
    10, 10            # 第一个测量点 (靠近左后丝杠)
    117.5, 205        # 第二个测量点 (靠近右后丝杠)
    225, 10           # 第三个测量点 (靠近中前丝杠)

speed: 400            # 测量间的移动速度
horizontal_move_z: 10 # 测量前抬升的高度
retries: 6            # 允许尝试的次数，直到达到精度
retry_tolerance: 0.01 # 精度要求
#####################################################################
#                              热床网格校准
#####################################################################
[bed_mesh]
speed: 300                   # 校准速度
horizontal_move_z: 10        # 探针前往下一个点之前Z需要抬升的高
mesh_min: 10,10              # 最小校准点坐标x，y
mesh_max: 220, 225           # 最大校准点坐标x，y
probe_count: 5,5             # 采样点数（4X4为16点）
mesh_pps: 2,2                # 补充采样点数
algorithm: bicubic           # 算法模型
bicubic_tension: 0.2         # 算法插值不要动

#####################################################################
#                              探测前释放热端
#####################################################################
[gcode_macro Z_TILT_ADJUST]
rename_existing: Z_TILT_ADJUST_BASE
gcode:
    UNTOOL        # 先确保没头
    Z_TILT_ADJUST_BASE {rawparams}  # 再执行原调平命令

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    UNTOOL        # 先确保没头
    BED_MESH_CALIBRATE_BASE {rawparams} # 再执行原调平命令

#####################################################################
#                           自定义gcode宏                            #
#####################################################################

[gcode_macro PRINT_START]
description: 打印开始宏（包含：归零、调平、按各材料独立温度加热、智能排序划线）
gcode:
    # ==========================================
    # 1. 接收切片软件传来的参数
    # ==========================================
    {% set BED_TEMP = params.BED|default(60)|float %}            
    
    # 重点：接收初始喷头编号，并转为字符串方便后面比对
    {% set INITIAL_TOOL = params.INITIAL_TOOL|default("0")|string %} 
    
    {% set tools_str = params.TOOLS|default("0,")|string %}
    {% set tool_list = tools_str.split(',') %}
    {% set temps_str = params.TEMPS|default("200,")|string %}
    {% set temp_list = temps_str.split(',') %}

    {% set start_x = params.START_X|default(100.0)|float %}
    {% set start_y = params.START_Y|default(5.0)|float %}
    {% set offset_y = params.OFFSET_Y|default(5.0)|float %}
    {% set prime_length = params.LENGTH|default(50.0)|float %}
    {% set pre_extrude = params.PRE_EXTRUDE|default(3.0)|float %}

    # ==========================================
    # 2. 预热热床与机器归零调平
    # ==========================================
    BED_MESH_CLEAR
    M140 S{BED_TEMP}          
    G28                       
    Z_TILT_ADJUST             
    G28 Z                     
    G1 Z20 F3000              
    BED_MESH_PROFILE LOAD=default 
    M190 S{BED_TEMP}          

    # ==========================================
    # 3. 按独立温度加热所有【用到】的喷头
    # ==========================================
    {% for i in range(tool_list|length) %}
        {% if tool_list[i] != "" and temp_list[i] != "" %}
            M104 S{temp_list[i]} T{tool_list[i]}
        {% endif %}
    {% endfor %}

    {% for i in range(tool_list|length) %}
        {% if tool_list[i] != "" and temp_list[i] != "" %}
            M109 S{temp_list[i]} T{tool_list[i]}
        {% endif %}
    {% endfor %}

    # ==========================================
    # 4. 依次切换喷头并进行边缘划线
    # ==========================================
    SAVE_GCODE_STATE NAME=print_start_state
    G90 
    G92 E0 

    {% set ns = namespace(line_index=0) %}

    # ----- 第 1 步：先给【非初始头】划线 -----
    {% for tool in tool_list %}
        # 只要不是空值，且【不是初始头】，就先给它划线
        {% if tool != "" and tool != INITIAL_TOOL %}
            T{tool}
            {% set current_y = start_y + (ns.line_index * offset_y) %}
            G1 Z5.0 F3000
            G1 X{start_x} Y{current_y} F6000
            G1 Z0.28 F1500
            G91 
            G1 E{pre_extrude} F300 
            G1 X{prime_length * 0.6} E{prime_length * 0.12} F1000 
            G1 X{prime_length * 0.4} E{prime_length * 0.05} F1500 
            G1 E-1.5 F2100 
            G1 Z2.0 F3000
            G90
            G92 E0
            M104 S0 T{tool}
            {% set ns.line_index = ns.line_index + 1 %}
        {% endif %}
    {% endfor %}

    # ----- 第 2 步：最后给【初始头】划线 -----
    # 确保切片传来的初始头确实在用到的列表里，然后最后拿起它划线
    {% if INITIAL_TOOL in tool_list %}
        T{INITIAL_TOOL}
        {% set current_y = start_y + (ns.line_index * offset_y) %}
        G1 Z5.0 F3000
        G1 X{start_x} Y{current_y} F6000
        G1 Z0.28 F1500
        G91 
        G1 E{pre_extrude} F300 
        G1 X{prime_length * 0.6} E{prime_length * 0.12} F1000 
        G1 X{prime_length * 0.4} E{prime_length * 0.05} F1500 
        G1 E0 F2100 
        G1 Z2.0 F3000
        G90
        G92 E0
        # 这里划完线之后，机器正好拿的就是初始头！
    {% endif %}

   # ==========================================
    # 5. 恢复状态，交给切片软件接管（修复首层错层 Bug）
    # ==========================================
    RESTORE_GCODE_STATE NAME=print_start_state
    
    # 【核心修复：重新应用初始头的偏移】
    # 因为上面的 RESTORE 会把 G-code 偏移清零，导致第一段颜色产生错位。
    # 这里我们读取配置，强行把初始头的偏移量再塞回去！
    {% if INITIAL_TOOL in tool_list %}
        {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
        {% set prefix = "t" ~ INITIAL_TOOL %}
        {% set off_x = cfg[prefix + "_offset_x"]|default(0.0)|float %}
        {% set off_y = cfg[prefix + "_offset_y"]|default(0.0)|float %}
        {% set off_z = cfg[prefix + "_offset_z"]|default(0.0)|float %}
        SET_GCODE_OFFSET X={off_x} Y={off_y} Z={off_z} MOVE=0
    {% endif %}

    { action_respond_info("划线结束。目前喷头为 T" ~ INITIAL_TOOL ~ "，已重新加载坐标偏移，准备直接打印！") }
#--------------------------------------------------------------------
[gcode_macro PRINT_END]            # 将 PRINT_END 设置为打印结束时的宏，自定义打印完成之后动作
gcode:
    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    
    #   Check end position to determine safe directions to move
    {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
    {% else %}
        {% set x_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
    {% else %}
        {% set y_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}
    UNTOOL
    SET_GCODE_OFFSET X=0 Y=0 Z=0 
    M400                              # 等待缓冲区清除
    G92 E0                            # 将挤出机归零
    G91                               # 相对定位
    G0 Z{z_safe} F3600                # 抬高龙门
    M104 S0 T0                        # 关闭热端1
    M104 S0 T1                        # 关闭热端2
    M104 S0 T2                        # 关闭热端3
    M104 S0 T3                        # 关闭热端3
    M140 S0                           # 关闭热床
    M106 S0                           # 关闭模型风扇
    G90                               # 设置绝对坐标体系
    G0 X{max_x / 2} Y{max_y} F3600    # 将喷嘴停在后部
    BED_MESH_CLEAR                    # 卸载网床

