nozzle_diameter: 0.400              # 喷嘴直径
filament_diameter: 1.75             # 耗材直径
heater_pin: expander:PC7            # 加热棒引脚
sensor_type: ATC Semitec 104GT-2    # 传感器型号  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: expander:PC2            # 传感器引脚,连接到 ADC_0   
