#####################################################################
#                               文件调用                               #
#####################################################################
[include fluidd.cfg]          # FLUIDD调用文件。
#[include mainsail.cfg]        # MAINSDIL调用文件。
[include toolchange.cfg]
[include calibration.cfg]
#[include plr.cfg]
#####################################################################
#                               主板配置                               #
#####################################################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_12345-if00
[mcu host]
serial: /tmp/klipper_host_mcu

#####################################################################
#                            副板扩展配置                             #
#####################################################################
[mcu expander]
# 这里填入你在第一步获取到的新主板ID
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_3F0035000357465036383420-if00 
#####################################################################
#                            机型和加速度                            #
#####################################################################
[printer]                       # 打印机设置
kinematics: corexy              # 运动学结构分为：笛卡尔和corexy等等。笛卡尔：cartesian
max_velocity: 600               # 打印机最大速度   
max_accel: 30000                 # 最大加速度 
max_z_velocity: 30              # z轴最大速度
max_z_accel: 300                # z轴最大加速度
square_corner_velocity: 5.0     # 方形拐角速度，小一点可以有效避免平台重带来的惯性
#####################################################################
#                             温度监控                               #
#####################################################################
[temperature_sensor FLY-Pi]
sensor_type: temperature_host

#[temperature_sensor Fly-C8p]     # FLY主板温度（可自行重命名）
#sensor_type: temperature_mcu     # 关联mcu（默认）

# [temperature_sensor Box]          # 箱内温度温度 （需要增加一颗温感,参考配置）
# sensor_type: ATC Semitec 104GT-2  # 传感器型号
# sensor_pin: PA4                   # 信号接口

#####################################################################
#             X/Y步进电机设置 (X/Y Stepper Settings)                 # 
#####################################################################
#   B Motor ---- Motor A 
#   |                  |
#   |------挤出机-------|
#   |                  |
#   |                  |
#          正前方   
#####################################################################
#                  X 轴步进电机 (B Motor)                            #
#####################################################################
[stepper_x]
step_pin: PE5                       # X轴电机脉冲引脚设置
dir_pin: !PA8                        # X轴电机运行引脚设置,方向按实际判断，加感叹号会让运行方向反转
enable_pin: !PA15                   # X轴电机使能引脚设置,使能引脚需要加感叹号，否者电机不工作
rotation_distance: 40               # 主动带轮周长mm（2GT-20T带轮40，2GT-16T带轮32）
microsteps: 64                      # 电机细分设置，细分越高，质量越高，但主控负荷越大
full_steps_per_rotation: 200        # 电机单圈所需脉冲数（1.8度电机:200，0.9度电机:400）
endstop_pin:tmc2209_stepper_x:virtual_endstop                   # 限位开关PIN脚,建议常闭然后添加！反转状态,位置在io-3 !PB3 
position_min: -10                     # X轴的最小行程
position_endstop: 245            # 限位开关的位置 (250mm-300mm-350mm)
position_max: 245                   # X轴的最大行程 (250mm-300mm-350mm)
homing_speed: 50                    # 复位速度，最大为100.归位速度建议别太快
homing_retract_dist: 0              # 第一次触发复位开关之后的后退距离
#--------------------------------------------------------------------
[tmc2209 stepper_x]                 # X 驱动配置 -TMC2209
uart_pin: PC9                       # 通讯端口Pin脚定义
interpolate: False                  # 否开启256微步插值，建议关闭（开启是True，关闭是False）
run_current: 1.2                   # 电机运行电流值（单位：mA）
sense_resistor: 0.110               # 驱动采样电阻不要改
driver_SGTHRS:90
diag_pin:^PD9
#stealthchop_threshold: 100          # 静音阀值（如果不需要静音，请将数值改为0）
#####################################################################
#                  Y 轴步进电机 (A Motor)                            #
#####################################################################
[stepper_y]
step_pin: PE4                       # Y轴电机脉冲引脚设置
dir_pin: PC11                      # Y轴电机运行引脚设置,方向按实际判断，加感叹号会让运行方向反转
enable_pin: !PC12                   # Y轴电机使能引脚设置,使能引脚需要加感叹号，否者电机不工作
rotation_distance: 40               # 主动带轮周长mm（2GT-20T带轮40，2GT-16T带轮32）
microsteps: 64                      # 电机细分设置，细分越高，质量越高，但主控负荷越大
full_steps_per_rotation: 200        # 电机单圈所需脉冲数（1.8度电机:200，0.9度电机:400）
endstop_pin:^!PD10
position_min: -33                   # Y轴的最小行程
position_endstop: 229               # 限位开关的位置 (250mm-300mm-350mm)
position_max: 229                   # Y轴的最大行程 (250mm-300mm-350mm)
homing_speed: 50                    # 复位速度，最大为100        归位速度建议别太快
homing_retract_dist: 5              # 第一次触发复位开关之后的后退距离 5
#--------------------------------------------------------------------
[tmc2209 stepper_y]                 # Y驱动配置 -TMC2209
uart_pin: PC10                      # 通讯端口Pin脚定义
interpolate: false                  # 否开启256微步插值，建议关闭（开启是True，关闭是False）
run_current: 1.2                    # 电机运行电流值（单位：mA）
sense_resistor: 0.110               # 驱动采样电阻不要改
diag_pin:^PD8
#stealthchop_threshold: 100          # 静音阀值（如果不需要静音，请将数值改为0）
#####################################################################
#                           Z轴步进电机                              #
#####################################################################
##    Z步进电机 - 左前方
[stepper_z]
step_pin: PE3                 # z轴电机脉冲引脚设置
dir_pin:  !PD1                 # z轴电机方向引脚设置,方向引脚需要按实际判断，加感叹号会让运行方向反转
enable_pin: !PD2               # z轴电机使能引脚设置,使能引脚需要加感叹号，否者电机不工作
rotation_distance: 8          # 丝杆导程为 8，请根据你的实际使用情况修改，总共需要修改3处
full_steps_per_rotation: 200  # 电机单圈所需脉冲数（1.8度电机:200，0.9度电机:400)
microsteps: 64                # 电机细分设置,细分越高，质量越高，但主控负荷越大
endstop_pin: probe:z_virtual_endstop            # 限位开关PIN脚,建议常闭然后添加！反转状态,位置在io-1
position_min: -10             # Z轴的最小行程（配置喷嘴清洁需要-5左右）
position_max: 180             # Z轴的最大行程 (250mm-300mm-350mm)
homing_speed: 10               # 复位速度-最大 20
second_homing_speed: 3        # 二次复位速度-最大 10
homing_retract_dist: 3        # 后撤距离
#--------------------------------------------------------------------
[tmc2208 stepper_z]
uart_pin: PD0                 # 驱动通信端口
interpolate: false            # 微步插值256
run_current: 0.8              # 运行电流mA
sense_resistor: 0.110         # 驱动采样电阻不要改
stealthchop_threshold: 500    # 静音阀值（如果不需要静音，请将数值改为0）
#--------------------------------------------------------------------
##    Z1 步进电机 - 后方
[stepper_z1]
step_pin: PE2                # z1轴电机脉冲引脚设置
dir_pin:  !PD4               # z1轴电机方向引脚设置,方向引脚需要按实际判断，加感叹号会让运行方向反转
enable_pin: !PD5              # z1轴电机使能引脚设置,使能引脚需要加感叹号，否者电机不工作
rotation_distance: 8          # 丝杆导程为 8
full_steps_per_rotation: 200  # 电机单圈所需脉冲数（1.8度电机:200，0.9度电机:400
microsteps: 64                # 电机细分设置,细分越高，质量越高，但主控负荷越大
#--------------------------------------------------------------------
[tmc2208 stepper_z1]
uart_pin: PD3               # 驱动通信端口
interpolate: false            # 微步插值256
run_current: 0.8              # 运行电流mA
sense_resistor: 0.110         # 驱动采样电阻不要改
stealthchop_threshold: 500    # 静音阀值（如果不需要静音，请将数值改为0）
#--------------------------------------------------------------------
##    Z2 步进电机 - 右前方
[stepper_z2]
step_pin: PE7                 # z2轴电机脉冲引脚设置
dir_pin: !PE11               # z2轴电机方向引脚设置,方向引脚需要按实际判断，加感叹号会让运行方向反转
enable_pin: !PE10             # z2轴电机使能引脚设置,使能引脚需要加感叹号，否者电机不工作
rotation_distance: 8          # 丝杆导程为 8
full_steps_per_rotation: 200  # 电机单圈所需脉冲数（1.8度电机:200，0.9度电机:400
microsteps: 64                # 电机细分设置,细分越高，质量越高，但主控负荷越大
#--------------------------------------------------------------------
[tmc2208 stepper_z2]
uart_pin: PC15                # 驱动通信端口
interpolate: false            # 微步插值256
run_current: 0.8              # 运行电流mA
sense_resistor: 0.110         # 驱动采样电阻不要改
stealthchop_threshold: 500    # 静音阀值（如果不需要静音，请将数值改为0）
#####################################################################
#                     E0 挤出机设置 （E0 Settings）                   # 
#####################################################################

[extruder]                          
step_pin: PE0                       # 挤出电机方脉冲引脚
dir_pin: PC13                       # 挤出电机方向引脚设置
enable_pin: !PC14                   # 挤出电机方使能引脚设置
rotation_distance: 55               # 步进值
gear_ratio: 44:10, 37:17            # 减速比（伽利略齿比7.5:1 并且这行注释掉；BMG为50：17，输出轴在前，输入轴在后）
microsteps: 32                      # 电机细分设置,细分越高，质量越高，但主控负荷越大
full_steps_per_rotation: 200        # 单圈脉冲数 （200 为 1.8 度, 400 为 0.9 度）
nozzle_diameter: 0.400              # 喷嘴直径
filament_diameter: 1.75             # 耗材直径
heater_pin: expander:PB12           # 加热棒引脚
sensor_type: ATC Semitec 104GT-2    # 传感器型号  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: expander:PC0            # 传感器引脚,连接到 ADC_0   
min_temp: -273                      # 最小温度（注意：测量温度超过设定值会触发紧急停止）
max_temp: 350                       # 最大温度（注意：测量温度超过设定值会触发紧急停止）
max_power: 1.0                      # 最大功率
min_extrude_temp: 0                 # 最小挤出温度（至少需要达到这个温度，挤出机才能挤出）
#喷嘴温度PID校准命令：  "PID_CALIBRATE HEATER=extruder TARGET=245
#control = pid                # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
#pid_kp = 26.213              # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
#pid_ki = 1.304               # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
#pid_kd = 131.721             # PID喷嘴温度自动校准项（pid校准完成后，会被注释）

#--------------------------------------------------------------------
[tmc2208 extruder]                  # 挤出机驱动配置
uart_pin: PB7                      # 通讯端口Pin脚定义
interpolate: False                  # 是否开启256微步插值（开启是True，关闭是False）
run_current: 0.8                    # 电机运行电流值
sense_resistor: 0.110               # 驱动采样电阻不要改
#stealthchop_threshold: 500          # 静音阀值，挤出机不建议开（如果不需要静音，请将数值改为0）

#####################################################################
#                     E1 挤出机设置 （E1 Settings）                   # 
#####################################################################

[extruder1]                         
nozzle_diameter: 0.400              # 喷嘴直径
filament_diameter: 1.75             # 耗材直径
heater_pin: expander:PC6            # 加热棒引脚
sensor_type: ATC Semitec 104GT-2    # 传感器型号  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: expander:PC1            # 传感器引脚,连接到 ADC_0   
min_temp: -273                      # 最小温度（注意：测量温度超过设定值会触发紧急停止）
max_temp: 350                       # 最大温度（注意：测量温度超过设定值会触发紧急停止）
max_power: 1.0                      # 最大功率
min_extrude_temp: 180               # 最小挤出温度（至少需要达到这个温度，挤出机才能挤出）
#喷嘴温度PID校准命令：  "PID_CALIBRATE HEATER=extruder1 TARGET=245
#control = pid                # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
#pid_kp = 26.213              # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
#pid_ki = 1.304               # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
#pid_kd = 131.721             # PID喷嘴温度自动校准项（pid校准完成后，会被注释）

