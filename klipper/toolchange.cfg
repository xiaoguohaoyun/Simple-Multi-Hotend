[save_variables]
filename: ~/printer_data/config/myvariables.cfg

[delayed_gcode RESTORE_TOOL_STATUS]
initial_duration: 0.1
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.current_tool is defined %}
        SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={svv.current_tool}
        # 可选：如果你的换刀逻辑包含其他操作（如设置温度、抬升Z轴等），可以在这里补充
    {% endif %}
#=================================================
# 1. 参数集中管理
#=================================================
[gcode_macro _toolchanger_cfg]
description: 工具切换参数配置

# --- 换刀抬升与速度 ---
variable_z_hop:       0.4   #换头抬升高度
variable_feed_z:      600   #抬升速度
variable_feed_fast:   24000 #工作速度（空驶）
#variable_feed_fast:   2000 #测试速度
variable_feed_slow:   5000  #工作速度（受力）

# --- 换刀回抽/清洗配置 ---
variable_swap_retract_len: 0   # [A] 释放回抽：放回底座时抽多少
variable_swap_prime_len:   0   # [B] 抓取清洗：抓取时挤出多少
variable_swap_retract_spd: 1000

# ========================================================
# 【停靠坞运动逻辑参数】
# ========================================================
variable_dock_shift_x: -3.5   # 横移开挤出机距离
variable_dock_dodge_y: 16     # 避让动作的 Y 轴相对位移
variable_dock_safe_y:  28     # 安全拔出的 Y 轴相对位移

#---------------------------------------------------------
# 各热端参数配置
#---------------------------------------------------------
# T0 配置
variable_t0_dock_x: 244.8       # T0 热端进入停靠坞大孔X坐标
variable_t0_dock_y: -26.5       # T0 热端进入停靠坞大孔Y坐标

# T1 配置
variable_t1_dock_x: 215.0       # (将原214.7微调对齐间距，若必须精确请改回214.7)
variable_t1_dock_y: -26.5

# T2 配置
variable_t2_dock_x: 184.8
variable_t2_dock_y: -26.5

# T3 配置
variable_t3_dock_x: 154.8
variable_t3_dock_y: -26.5

gcode:

#=================================================
# 2. 切换热端命令（根据自己的热端数添加对应数量）
#=================================================
[gcode_macro T0]     #输入T0，当前有热端则卸载当前热端抓取T0，无热端则直接抓取T0
gcode: change_tool T=0

[gcode_macro T1]
gcode: change_tool T=1

[gcode_macro T2]
gcode: change_tool T=2

[gcode_macro T3]
gcode: change_tool T=3

[gcode_macro UNTOOL]  #卸载当前热端
gcode: change_tool T=-1

#=================================================
# 3. 状态变量（记录当前抓取头）
#=================================================
[gcode_macro _tool_status]
variable_current_tool: -1
gcode:

#=================================================
# 4. 释放热端
#=================================================
[gcode_macro _release_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set active_extruder = printer.toolhead.extruder %}
    
    # 获取当前喷头的核心点坐标和相对位移
    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    {% set msg = "正在放回 T%d" % tool %}   M118 {msg}

    # --- [A] 释放回抽 (防止底座溢料) ---
    {% set cur_temp = printer[active_extruder].temperature|float %}
    {% set min_temp = printer.configfile.settings[active_extruder].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
       M83  
       G1 E-{cfg.swap_retract_len} F{cfg.swap_retract_spd} 
       G4 P100 
    {% else %}
       M118 温度不足({cur_temp})，跳过释放回抽。
    {% endif %}

    # --- 开始释放动作 (抓取动作的逆序) ---
    G90 
    # 1. 带热端走到到X轴对准停靠坞大孔，Y轴位于停靠坞外（停靠坞入口）
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}
    
    # 2. 带热端Y轴移动完全进入停靠坞
    G0 X{dock_x} Y{dock_y} F{cfg.feed_fast}
    G4 P100
    
    # 3. 横移打开挤出机摆臂
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}
    
    # 4. 打印头离开停靠坞拔开与打印头磁吸锁定的热端
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow}
    
    # 5. 反向横移闭合挤出机摆臂
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_slow}
    
    # 6. 完全离开停靠坞（停靠坞入口）
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}
    G4 P100

#=================================================
# 5. 抓取热端
#=================================================
[gcode_macro _pickup_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set current_heater = "extruder" if tool == 0 else ("extruder" ~ tool) %}
    
    # 获取当前喷头的核心点坐标和相对位移
    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    {% set msg = "【抓取】正在抓取 T%d" % tool %}   M118 {msg}
    
    # --- 开始抓取动作 ---
    G90
    # 1. 到达停靠坞入口
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}
    
    # 2. Y轴前进到避让位置（让摆臂能摸到摆臂撑杆，同时打印头不撞到停靠的热端）
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_fast}
    
    # 3. 横移开挤出机
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow}
    
    # 4. Y轴移动完全进入停靠坞（打印头与热端磁吸结合）
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}
    G4 P100
    
    # 5. 反向横移闭合挤出机夹紧耗材丝
    G0 X{dock_x} Y{dock_y} F{cfg.feed_slow}
    
    # <<< 停靠坞内挤出补偿 >>>
    {% set cur_temp = printer[current_heater].temperature|float %}
    {% set min_temp = printer.configfile.settings[current_heater].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
         M83 
         G1 E{cfg.swap_prime_len} F{cfg.swap_retract_spd} 
         G4 P100
    {% else %}
         M118 温度不足({cur_temp})，跳过抓取处理。
    {% endif %}

    # 6. 完全离开停靠坞（停靠坞入口）
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}
    G4 P100
     
#=================================================
# 6. 主切换宏
#=================================================
[gcode_macro change_tool]
gcode:
    {% set new_tool = params.T|default(-1)|int %}
    {% set old_tool = printer["gcode_macro _tool_status"].current_tool|int %}
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}

    {% if new_tool == old_tool %}
        M118 目标状态与当前一致(T{new_tool})，无需操作。
    {% else %}
        {% if new_tool == -1 %}
            M118 收到卸载指令：正在卸载 T{old_tool} ...
        {% else %}
            M118 切换工具: T{old_tool} -> T{new_tool}
        {% endif %}

        #保存换头前状态
        SAVE_GCODE_STATE NAME=tool_change

        #换头前屏蔽断料检测
        SET_FILAMENT_SENSOR SENSOR=tool_sensor ENABLE=0
        
        #抬升
        G91
        G0 Z{cfg.z_hop} F{cfg.feed_z}
        G90
        
        #清除偏移偏移量采用统一的停靠坞坐标
        SET_GCODE_OFFSET X=0 Y=0 Z=0

        #释放旧工具
        {% if old_tool != -1 %}
            _release_tool TOOL={old_tool}
        {% else %}
            M118 当前无工具，跳过释放。
        {% endif %}

        #抓取新工具
        {% if new_tool != -1 %}
            {% set next_heater = "extruder" if new_tool == 0 else ("extruder" ~ new_tool) %}
            {% set target_temp = printer[next_heater].target|float %}
            {% if target_temp > 0 %}
                {% if printer[next_heater].temperature < (target_temp - 2) %}
                    M118 T{new_tool} 预热中...
                    TEMPERATURE_WAIT SENSOR={next_heater} MINIMUM={target_temp}
                {% endif %}
            {% endif %}

            _pickup_tool  TOOL={new_tool}
        {% else %}
            M118 工具已卸载。
        {% endif %}

        #更新状态变量
        SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={new_tool}

        #恢复到换头前位置
        RESTORE_GCODE_STATE NAME=tool_change MOVE=0 
        
        # ==========================================
        # 应用喷嘴偏移量 (纯外置变量读取逻辑)
        # ==========================================
        {% if new_tool != -1 %}
            {% set svv = printer.save_variables.variables %}
            
            # 使用字符串拼接键名，直接从 svv 中读取，若不存在则 default 为 0.0
            {% set off_x = svv["t" ~ new_tool ~ "_offset_x"] | default(0.0) | float %}
            {% set off_y = svv["t" ~ new_tool ~ "_offset_y"] | default(0.0) | float %}
            {% set off_z = svv["t" ~ new_tool ~ "_offset_z"] | default(0.0) | float %}
            
            SET_GCODE_OFFSET X={off_x} Y={off_y} Z={off_z} MOVE=0
            { action_respond_info("T" ~ new_tool ~ " 加载校准值: X=" ~ off_x ~ " Y=" ~ off_y ~ " Z=" ~ off_z) }
        {% endif %}

        #换头后断料检测
        {% if new_tool != -1 %}
             G4 P100  ; 停顿 0.1 秒
            _VERIFY_TOOL_AND_ENABLE_SENSOR ; 调用独立子宏进行判定
        {% endif %}
        # 如果 new_tool 是 -1 (UNTOOL卸载)，就不进行检测，保持传感器关闭即可。

        SAVE_VARIABLE VARIABLE=current_tool VALUE={new_tool}

    {% endif %}

#断料与换头失败检测开关定义
[filament_switch_sensor tool_sensor]
switch_pin: !expander:PA9 
pause_on_runout: False
runout_gcode:
    { action_respond_info("错误：打印中断料报警！已暂停打印。") }
    PAUSE # 打印过程中触发（断料）时的动作
insert_gcode:
    { action_respond_info("耗材已插入。") } # 插入耗材时的动作

[delayed_gcode DISABLE_SENSOR_ON_BOOT]
# 开机 1 秒后自动运行这个宏
initial_duration: 1.0
gcode:
    # 强制关闭断料检测
    SET_FILAMENT_SENSOR SENSOR=tool_sensor ENABLE=0
    { action_respond_info("初始化：当前无活动热端，已默认静默断料检测。") }

#断料与换头失败检测
[gcode_macro _VERIFY_TOOL_AND_ENABLE_SENSOR]
description: 在抓取完成后，读取微动开关状态以判断是否抓取失败
gcode:
    {% set has_filament = printer["filament_switch_sensor tool_sensor"].filament_detected %}
    
    {% if has_filament %}  # 开关处于正常状态
        { action_respond_info("换头成功，耗材状态正常，重新开启断料检测。") }
        SET_FILAMENT_SENSOR SENSOR=tool_sensor ENABLE=1  # 恢复断料检测监控
    {% else %}  # 开关处于异常触发状态
        { action_respond_info("致命错误：换头失败（未抓到喷头）或新喷头无耗材！已紧急暂停！") }
        PAUSE
    {% endif %}

#移除M109等待喷嘴温度稳定
[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|default(0)|float %}
    {% set r = params.R|default(0)|float %}
    {% set target_temp = s if s > 0 else r %}
    {% set tool_index = params.T|default(-1)|int %}
    {% set sensor_name = printer.toolhead.extruder %}

    {% if tool_index != -1 %}
        {% if tool_index == 0 %}
            {% set sensor_name = "extruder" %}
        {% else %}
            {% set sensor_name = "extruder" ~ tool_index %}
        {% endif %}
    {% endif %}

    {% if target_temp > 0 %}
        {% if tool_index != -1 %}
            M104 S{target_temp} T{tool_index}
        {% else %}
            M104 S{target_temp}
        {% endif %}
        TEMPERATURE_WAIT SENSOR={sensor_name} MINIMUM={target_temp - 1.0}
    {% endif %}

